<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo.svg"
      type="image/x-icon"
    />
    <title>AMS | Login</title>
    <link rel="stylesheet" href="./bootsrap-core-assets/bs-css/bootstrap.css" />
    <link
      rel="stylesheet"
      href="./bootsrap-core-assets/bs-css/bootstrap-icon.css"
    />
  </head>
  <body data-bs-theme="dark">
    <nav
      class="navbar navbar-dark bg-dark navbar-expand-lg pt-3 pb-3 text-light"
    >
      <div class="container-fluid">
        <a href="#" class="navbar-brand">
          <img src="./assets/images/logo.svg" height="35px" />
        </a>
        <button
          class="navbar-toggler border-light"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon text-light"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav text-light ms-auto">
            <li class="nav-item">
              <a href="" class="nav-link text-light"> How to Articles</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- <hr> -->
    <section class="bg-dark p-3">
      <div class="container">
        <div class="row justify-content-end mt-5">
          <div
            class="col-lg-5 col-md-8 col-12 bg-dark py-3 rounded-1 border px-4"
          >
            <h2 class="text-start text-light mt-3 mb-5">Login</h2>
            <form action="" method="post" class="px-3">
              <label for="" class="form-label">Select Role</label>
              <div class="input-group bg-dark mb-3">
                <span class="input-group-text">
                  <i class="bi bi-people"></i>
                </span>
                <select name="" id="" class="form-select form-select-lg">
                  <option value="">Select Role</option>
                  <option value="">Student</option>
                  <option value="">Faculty</option>
                  <option value="">Admin</option>
                </select>
              </div>

              <label for="" class="form-label">Enter email</label>
              <div class="input-group bg-dark mb-3">
                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>
                <input
                  type="email"
                  name=""
                  id=""
                  class="form-control form-select-lg"
                  placeholder="Enter your email"
                />
              </div>

              <label for="" class="form-label">Enter Password</label>
              <div class="input-group bg-dark mb-3">
                <span class="input-group-text">
                  <i class="bi bi-key"></i>
                </span>
                <input
                  type="password"
                  name=""
                  id=""
                  class="form-control form-select-lg"
                  placeholder="Enter your password"
                />
              </div>

              <button type="submit" class="btn btn-primary w-100 my-3 btn-lg">
                Login
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <hr>
    <section class="text-center my-5">
      <div class="container">
        <footer>
          <p class="lead d-inline">&copy; AMS (Minor Project)</p>
          <p class="ms-auto">2025</p>
        </footer>
      </div>
    </section>

    <script src="./bootsrap-core-assets/bs-js/bootstrap.js"></script>
  </body>
</html>
